{{- if .Values.workers.temporal.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "airp.fullname" . }}-temporal-worker
  labels:
    app.kubernetes.io/name: {{ include "airp.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: temporal-worker
spec:
  replicas: {{ .Values.workers.temporal.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "airp.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: temporal-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "airp.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: temporal-worker
    spec:
      securityContext:
{{ toYaml .Values.podSecurityContext | indent 8 }}
      containers:
        - name: temporal-worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
{{ toYaml .Values.workers.temporal.command | indent 12 }}
          env:
{{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
{{- end }}
{{- range $key, $_ := .Values.secretEnv }}
            - name: {{ $key }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "airp.fullname" $ }}-secrets
                  key: {{ $key }}
{{- end }}
          resources:
{{ toYaml .Values.resources | indent 12 }}
          securityContext:
{{ toYaml .Values.securityContext | indent 12 }}
{{- end }}
