replicaCount: 2

image:
  repository: docker.io/your-org/airp-backend
  tag: "0.1.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

env:
  AIRP_ENVIRONMENT: production
  AIRP_LOG_LEVEL: INFO
  AIRP_AUTH_ENABLED: "true"
  AIRP_DATABASE_URL: ""
  AIRP_REDIS_URL: ""
  AIRP_ENTRA_TENANT_ID: ""
  AIRP_ENTRA_CLIENT_ID: ""
  AIRP_GATEWAY_BASE_URL: "https://hub-proxy-service.thankfulfield-16b4d5d6.eastus.azurecontainerapps.io"
  AIRP_KAFKA_BOOTSTRAP_SERVERS: ""
  AIRP_KAFKA_SECURITY_PROTOCOL: SASL_SSL
  AIRP_KAFKA_SASL_MECHANISM: PLAIN
  AIRP_KAFKA_USERNAME: "$ConnectionString"
  AIRP_KAFKA_ALERTS_RAW_TOPIC: airp.alerts.raw
  AIRP_KAFKA_DEADLETTER_TOPIC: airp.deadletter
  AIRP_KAFKA_ALERT_CONSUMER_GROUP: airp-alert-consumer
  AIRP_TEMPORAL_ADDRESS: ""
  AIRP_TEMPORAL_NAMESPACE: default
  AIRP_TEMPORAL_TASK_QUEUE: airp-incident-workflows
  AIRP_TEMPORAL_START_WORKFLOWS: "true"
  AIRP_AGENT_READ_ONLY_EVIDENCE_ENABLED: "false"
  AIRP_KUBERNETES_MCP_TRANSPORT: disabled
  AIRP_KUBERNETES_MCP_URL: ""
  AIRP_KUBERNETES_MCP_NAMESPACE_ALLOWLIST: ""
  AIRP_KUBERNETES_MCP_READ_TIMEOUT_SECONDS: "20"
  AIRP_GITHUB_MCP_TRANSPORT: disabled
  AIRP_GITHUB_MCP_URL: ""
  AIRP_GITHUB_MCP_REPOSITORY_ALLOWLIST: "AIRP-client/*"
  AIRP_GITHUB_MCP_READ_TIMEOUT_SECONDS: "20"
  AIRP_DOCKERHUB_BASE_URL: "https://hub.docker.com/v2"
  AIRP_DOCKERHUB_READ_TIMEOUT_SECONDS: "20"
  AIRP_MCP_READ_RETRY_ATTEMPTS: "2"
  AIRP_READINESS_ACTIVE_CHECKS_ENABLED: "false"
  AIRP_READINESS_PROBE_TIMEOUT_SECONDS: "2"

secretEnv:
  AIRP_GATEWAY_API_KEY: ""
  AIRP_KAFKA_PASSWORD: ""

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

workers:
  alertConsumer:
    enabled: true
    replicaCount: 1
    command: ["python", "-m", "airp.workers.alert_consumer"]
  temporal:
    enabled: true
    replicaCount: 1
    command: ["python", "-m", "airp.workers.temporal_worker"]

ingress:
  enabled: false
  className: nginx
  hosts:
    - host: airp.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
